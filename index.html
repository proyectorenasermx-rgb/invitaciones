<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inviclicks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="background-svg"></div>

  <header>
    <h1>Invitaciones Creativas</h1>
    <p>Explora diferentes estilos para tus eventos</p>
  </header>

  <section class="carousel-container">
    <button class="prev">❮</button>

    <div class="carousel">
      <a href="https://ejemplo1.com" target="_blank" class="slide active">
        <img src="https://picsum.photos/id/1015/800/400" alt="Invitación boda">
        <div class="caption">Boda elegante</div>
      </a>

      <a href="https://ejemplo2.com" target="_blank" class="slide">
        <img src="https://picsum.photos/id/1016/800/400" alt="Invitación cumpleaños">
        <div class="caption">Cumpleaños moderno</div>
      </a>

      <a href="https://ejemplo3.com" target="_blank" class="slide">
        <img src="https://picsum.photos/id/1018/800/400" alt="Invitación fiesta">
        <div class="caption">Fiesta juvenil</div>
      </a>
    </div>

    <button class="next">❯</button>
  </section>

  <section class="features">
    <h2>Elementos para invitaciones</h2>
    <div class="grid">
      <div class="card">🎨 Colores personalizados</div>
      <div class="card">✍️ Tipografías elegantes</div>
      <div class="card">📍 Ubicación con mapa</div>
      <div class="card">📅 Fecha y hora</div>
      <div class="card">🎵 Música o video</div>
      <div class="card">📩 Confirmación RSVP</div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
