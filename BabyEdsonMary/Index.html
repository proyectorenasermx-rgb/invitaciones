<!-- 🌿 LLUVIA DE HOJAS -->
<div class="lluvia-hojas"></div>
<!-- 🌫️ NIEBLA SELVA -->
<div class="niebla"></div>

<body>

    

    <!-- Música -->
    <audio id="musica" autoplay loop>
        <source src="./Imagenes/Cancionesdesol.mp3" type="audio/mpeg">
    </audio>

    <!-- Botón de pausa -->
    <button id="btnMusica">⏸️ Pausar MÚSICA</button>

 <!-- Imágenes de jirafa -->
    <img src="./Imagenes/jirafa_cuerpo.png" class="jirafa-cuerpo">
    <img src="./Imagenes/cabeza_jirafa.png" class="jirafa-cabeza">

    <!-- Contenido principal -->
    <div class="contenedor">
        <div class="tarjeta">
                   
            <h1>¡Baby Shower!</h1>
            <p>Te invitamos a celebrar la llegada de nuestro bebé 🍼</p>

            <p><strong>Fecha:</strong> 16 de Mayo</p>
            <p><strong>Hora:</strong> 2:00 PM</p>
            <p><strong>Lugar:</strong> Mi casita 🏡</p>

             <!-- =====================
         BOTÓN FORMULARIO
    ===================== -->
    <button id="btnFormulario" class="btn-principal pulse">
        Confirmar asistencia
    </button>
    <!-- =====================
         FORMULARIO
    ===================== -->
    <form id="formulario" class="formulario oculto">

        <input id="nombre" type="text" placeholder="Nombre completo" required>
        <input id="telefono" type="tel" placeholder="ID" required>

        <h4>¿Asistirás?</h4>
        <div class="asistencia">
            <button type="button" class="btn-asistencia" data-valor="SI">Sí</button>
            <button type="button" class="btn-asistencia" data-valor="NO">No</button>
        </div>

        <button type="submit" class="btn-principal btn-grande pulse">
            ENVIAR CONFIRMACIÓN
        </button>
    </form>

            
        </div>
    </div>


    <!-- =====================
         CONTADOR
    ===================== -->
    <div id="contador">
        <div><span id="dias">0</span><br>Días</div>
        <div><span id="horas">0</span><br>Horas</div>
        <div><span id="minutos">0</span><br>Min</div>
        <div><span id="segundos">0</span><br>Seg</div>
    </div>

    <!-- =====================
         MAPA
    ===================== -->
    <h3>📍 Ubicación</h3>

</div>
