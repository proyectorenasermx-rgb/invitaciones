<section class="fade">
  <h1>💌 Confirmar asistencia</h1>
  <p>Dime si vienes, así te guardo pastel 🍰</p>
  
  <!-- PASO 1: Asistencia -->
  <div class="paso fade">
    <p>¿Vas a venir a mi fiesta?</p>
    <button class="btn" onclick="asistir('Sí')">¡Sí, no me lo pierdo! 💖</button>
    <button class="btn" onclick="asistir('No')">No puedo, pero te mando un abrazo 💔</button>
    <button class="btn" onclick="siguiente()" style="margin-top: 20px;">Siguiente ➡️</button>
  </div>
  
  <!-- PASO 2: Eventos -->
  <div class="paso" style="display:none;">
    <p>¿A qué eventos vienes?</p>
    <button class="btn" onclick="evento('Recepción')">☀️ Recepción (8am)</button>
    <button class="btn" onclick="evento('Cocktail')">🍸 Cocktail (5pm)</button>
    <button class="btn" onclick="evento('Fiesta')">🎉 Fiesta (8pm)</button>
    <button class="btn" onclick="siguiente()" style="margin-top: 20px;">Siguiente ➡️</button>
  </div>
  
  <!-- PASO 3: Datos -->
  <div class="paso" style="display:none;">
    <p>Datos para confirmar</p>
    <input type="text" id="nombre" placeholder="Tu nombre completo">
    <input type="tel" id="telefono" placeholder="Teléfono (10 dígitos)">
    <input type="email" id="correo" placeholder="Correo electrónico">
    <button class="btn" onclick="enviar()" style="width: 100%;">💕 Confirmar</button>
  </div>
</section>

<audio id="musica" loop>
  <source src="assets/musica.mp3" type="audio/mpeg">
</audio>

  <button id="toggle-music">🎵 Música</button>
